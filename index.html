<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pro TXT Viewer</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #08090b;
    --surface: #111318;
    --card: #161920;
    --border: rgba(255, 255, 255, 0.08);
    --accent: #00e5ff;
    --accent2: #7b61ff;
    --text: #f0f2f5;
    --muted: #8b949e;
    --success: #00ffa3;
    --mono: 'Space Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    line-height: 1.5;
  }

  /* Animated background */
  .bg-grid {
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(0,229,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.02) 1px, transparent 1px);
    background-size: 50px 50px;
    z-index: -1;
  }

  .glow-orb {
    position: fixed;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(123,97,255,0.08) 0%, transparent 70%);
    top: -200px;
    right: -100px;
    z-index: -1;
    animation: orbFloat 10s ease-in-out infinite;
  }

  @keyframes orbFloat { 0%, 100% { transform: translate(0,0); } 50% { transform: translate(-40px, 40px); } }

  .container {
    max-width: 1000px;
    margin: 0 auto;
    padding: 60px 24px;
  }

  header { text-align: center; margin-bottom: 60px; }

  .logo-tag {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 2px;
    border: 1px solid var(--accent);
    padding: 4px 12px;
    border-radius: 100px;
    background: rgba(0,229,255,0.05);
    margin-bottom: 20px;
  }

  h1 {
    font-size: clamp(2.5rem, 8vw, 4rem);
    font-weight: 800;
    letter-spacing: -1px;
    background: linear-gradient(to right, #fff, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  /* Improved Upload Zone */
  .upload-zone {
    background: var(--surface);
    border: 2px dashed var(--border);
    border-radius: 24px;
    padding: 60px 20px;
    text-align: center;
    transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    cursor: pointer;
    position: relative;
  }

  .upload-zone:hover {
    border-color: var(--accent);
    background: rgba(0,229,255,0.02);
    transform: translateY(-4px);
  }

  .upload-btn {
    display: inline-block;
    background: var(--text);
    color: var(--bg);
    padding: 12px 28px;
    border-radius: 12px;
    font-weight: 700;
    font-size: 14px;
    margin-top: 20px;
  }

  /* Sticky Controls */
  .controls-sticky {
    position: sticky;
    top: 20px;
    z-index: 100;
    margin-bottom: 40px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .search-wrap {
    background: rgba(19, 21, 26, 0.8);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 6px;
    display: flex;
    align-items: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  }

  .search-wrap input {
    flex: 1;
    background: transparent;
    border: none;
    padding: 12px 16px;
    color: white;
    font-family: var(--mono);
    outline: none;
  }

  .stats-badge {
    background: var(--card);
    padding: 6px 16px;
    border-radius: 12px;
    font-family: var(--mono);
    font-size: 11px;
    border: 1px solid var(--border);
    color: var(--muted);
  }

  /* Cards */
  #cardsContainer {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px;
    transition: all 0.3s ease;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .card:hover {
    border-color: var(--accent2);
    transform: scale(1.02);
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
  }

  .card-header {
    border-bottom: 1px solid var(--border);
    padding-bottom: 16px;
  }

  .card-index {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent2);
    display: block;
    margin-bottom: 4px;
  }

  .card-url {
    color: var(--text);
    text-decoration: none;
    font-weight: 600;
    word-break: break-all;
    font-size: 15px;
  }

  .field-item {
    background: rgba(255,255,255,0.03);
    border-radius: 12px;
    padding: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }

  .field-info { overflow: hidden; }

  .field-key {
    font-size: 9px;
    text-transform: uppercase;
    font-family: var(--mono);
    color: var(--muted);
    display: block;
  }

  .field-val {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .btn-copy {
    background: rgba(255,255,255,0.05);
    border: none;
    color: var(--muted);
    width: 32px;
    height: 32px;
    border-radius: 8px;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.2s;
  }

  .btn-copy:hover {
    background: var(--accent);
    color: #000;
  }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--success);
    color: #000;
    padding: 12px 24px;
    border-radius: 12px;
    font-weight: 800;
    font-size: 12px;
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    z-index: 1000;
  }

  #toast.show { transform: translateX(-50%) translateY(0); }

  [hidden] { display: none !important; }
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="glow-orb"></div>

<div class="container">
  <header>
    <div class="logo-tag"><span>✦</span> SYSTEM OPERATIONAL</div>
    <h1>Data Streamer</h1>
  </header>

  <div id="dropZone" class="upload-zone">
    <input type="file" id="fileInput" accept=".txt" hidden />
    <div style="font-size: 40px; margin-bottom: 10px;">💾</div>
    <h3>Drop raw log or .txt file here</h3>
    <p style="color: var(--muted); font-size: 14px; margin-top: 8px;">Automated key-value parsing enabled</p>
    <button class="upload-btn" onclick="document.getElementById('fileInput').click()">SELECT FILE</button>
  </div>

  <div id="uiControls" class="controls-sticky" hidden>
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Search keywords, URLs, or values..." />
      <div id="stats" class="stats-badge">0 ENTRIES</div>
    </div>
  </div>

  <div id="cardsContainer"></div>
</div>

<div id="toast">COPIED TO CLIPBOARD</div>

<script>
  let entries = [];

  const fileInput = document.getElementById('fileInput');
  const dropZone = document.getElementById('dropZone');
  const searchInput = document.getElementById('searchInput');

  // Trigger file selection
  fileInput.onchange = (e) => handleFile(e.target.files[0]);

  // Drag and drop logic
  dropZone.ondragover = (e) => { e.preventDefault(); dropZone.style.borderColor = "var(--accent)"; };
  dropZone.ondragleave = () => { dropZone.style.borderColor = "var(--border)"; };
  dropZone.ondrop = (e) => {
    e.preventDefault();
    handleFile(e.dataTransfer.files[0]);
  };

  function handleFile(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      processData(e.target.result);
      document.getElementById('uiControls').hidden = false;
      dropZone.style.display = 'none';
    };
    reader.readAsText(file);
  }

  function processData(text) {
    const blocks = text.split(/\n\s*\n/);
    entries = blocks.map(block => {
      const lines = block.split('\n').filter(l => l.includes(':'));
      const obj = { fields: [] };
      lines.forEach(line => {
        const [key, ...valParts] = line.split(':');
        const k = key.trim();
        const v = valParts.join(':').trim();
        if (k.toLowerCase() === 'url') obj.url = v;
        else obj.fields.push({ k, v });
      });
      return obj;
    }).filter(e => e.url || e.fields.length);
    
    render();
  }

  function render(filter = '') {
    const container = document.getElementById('cardsContainer');
    const filtered = entries.filter(e => 
      JSON.stringify(e).toLowerCase().includes(filter.toLowerCase())
    );
    
    document.getElementById('stats').textContent = `${filtered.length} ENTRIES`;
    container.innerHTML = filtered.map((e, i) => `
      <div class="card">
        <div class="card-header">
          <span class="card-index">RECORD #0${i+1}</span>
          <a href="${e.url}" target="_blank" class="card-url">${e.url || 'No URL Found'}</a>
        </div>
        ${e.fields.map(f => `
          <div class="field-item">
            <div class="field-info">
              <span class="field-key">${f.k}</span>
              <span class="field-val" title="${f.v}">${f.v}</span>
            </div>
            <button class="btn-copy" onclick="copy('${f.v}')">⧉</button>
          </div>
        `).join('')}
      </div>
    `).join('');
  }

  searchInput.oninput = (e) => render(e.target.value);

  function copy(text) {
    navigator.clipboard.writeText(text);
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }
</script>
</body>
</html>

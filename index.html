<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TXT File Viewer</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0b0c0f;
    --surface: #13151a;
    --card: #1a1d25;
    --border: #2a2d38;
    --accent: #00e5ff;
    --accent2: #7b61ff;
    --text: #e8eaf0;
    --muted: #6b7080;
    --success: #00e096;
    --mono: 'Space Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .glow-orb {
    position: fixed;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(123,97,255,0.12) 0%, transparent 70%);
    top: -100px;
    right: -100px;
    pointer-events: none;
    z-index: 0;
    animation: orbFloat 8s ease-in-out infinite;
  }

  @keyframes orbFloat {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(-30px, 30px); }
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 50px;
  }

  .logo-tag {
    display: inline-block;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 4px;
    text-transform: uppercase;
    border: 1px solid rgba(0,229,255,0.3);
    padding: 4px 12px;
    border-radius: 2px;
    margin-bottom: 16px;
    background: rgba(0,229,255,0.05);
  }

  h1 {
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 800;
    line-height: 1.1;
    background: linear-gradient(135deg, #fff 0%, var(--accent) 60%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 10px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 14px;
    font-family: var(--mono);
  }

  /* Upload Zone */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 16px;
    padding: 50px 30px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
    background: var(--surface);
    position: relative;
    overflow: hidden;
    margin-bottom: 40px;
  }

  .upload-zone::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(0,229,255,0.03), rgba(123,97,255,0.03));
    opacity: 0;
    transition: opacity 0.3s;
  }

  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 20px 60px rgba(0,229,255,0.08);
  }

  .upload-zone:hover::before, .upload-zone.drag-over::before {
    opacity: 1;
  }

  .upload-icon {
    font-size: 48px;
    margin-bottom: 16px;
    display: block;
    filter: grayscale(0.3);
    transition: transform 0.3s;
  }

  .upload-zone:hover .upload-icon { transform: scale(1.1) rotate(-5deg); }

  .upload-label {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
  }

  .upload-hint {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
  }

  .upload-btn {
    display: inline-block;
    margin-top: 16px;
    padding: 10px 24px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border-radius: 8px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    color: #000;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: opacity 0.2s, transform 0.2s;
  }

  .upload-btn:hover { opacity: 0.85; transform: scale(0.98); }

  #fileInput { display: none; }

  /* Stats Bar */
  .stats-bar {
    display: flex;
    gap: 20px;
    margin-bottom: 30px;
    padding: 14px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    animation: fadeSlide 0.4s ease;
    flex-wrap: wrap;
  }

  .stats-bar span { color: var(--accent); font-weight: 700; }

  /* Search */
  .search-wrap {
    position: relative;
    margin-bottom: 30px;
  }

  .search-wrap input {
    width: 100%;
    padding: 14px 20px 14px 46px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .search-wrap input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,229,255,0.08);
  }

  .search-wrap input::placeholder { color: var(--muted); }

  .search-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 16px;
  }

  /* Cards Grid */
  #cardsContainer {
    display: grid;
    gap: 16px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    animation: fadeSlide 0.4s ease both;
    transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
  }

  .card:hover {
    border-color: rgba(0,229,255,0.25);
    box-shadow: 0 8px 40px rgba(0,0,0,0.3);
    transform: translateY(-1px);
  }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 18px;
    background: rgba(0,229,255,0.04);
    border-bottom: 1px solid var(--border);
  }

  .card-num {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent);
    background: rgba(0,229,255,0.1);
    border: 1px solid rgba(0,229,255,0.2);
    padding: 2px 8px;
    border-radius: 4px;
    letter-spacing: 1px;
    flex-shrink: 0;
  }

  .card-url {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent);
    text-decoration: none;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
    transition: opacity 0.2s;
  }

  .card-url:hover { opacity: 0.75; text-decoration: underline; }

  .copy-url-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 4px 8px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .copy-url-btn:hover { border-color: var(--accent); color: var(--accent); }

  .card-body { padding: 14px 18px; display: flex; flex-direction: column; gap: 10px; }

  .field-row {
    display: flex;
    align-items: stretch;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .field-row:hover { border-color: rgba(123,97,255,0.4); }

  .field-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    color: var(--accent2);
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 12px 14px;
    background: rgba(123,97,255,0.08);
    border-right: 1px solid var(--border);
    display: flex;
    align-items: center;
    min-width: 80px;
    white-space: nowrap;
  }

  .field-value {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text);
    padding: 12px 14px;
    flex: 1;
    word-break: break-all;
    display: flex;
    align-items: center;
  }

  .field-value.empty { color: var(--muted); font-style: italic; }

  .copy-btn {
    background: none;
    border: none;
    border-left: 1px solid var(--border);
    color: var(--muted);
    padding: 10px 14px;
    cursor: pointer;
    font-size: 15px;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .copy-btn:hover {
    background: rgba(0,229,255,0.06);
    color: var(--accent);
  }

  .copy-btn.copied {
    color: var(--success);
    animation: popIn 0.3s ease;
  }

  @keyframes popIn {
    0% { transform: scale(0.8); }
    60% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 13px;
  }

  .empty-state .big { font-size: 40px; margin-bottom: 10px; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: var(--success);
    color: #000;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    padding: 10px 20px;
    border-radius: 8px;
    z-index: 999;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    letter-spacing: 1px;
  }

  .toast.show { transform: translateY(0); opacity: 1; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
</style>
</head>
<body>

<div class="glow-orb"></div>

<div class="container">

  <header>
    <div class="logo-tag">⚡ TXT Viewer</div>
    <h1>File Data Viewer</h1>
    <p class="subtitle">// upload → parse → display → copy</p>
  </header>

  <div class="upload-zone" id="dropZone">
    <span class="upload-icon">📂</span>
    <div class="upload-label">Drop your .txt file here</div>
    <div class="upload-hint">or click the button below to browse</div>
    <label for="fileInput" class="upload-btn">Choose File</label>
    <input type="file" id="fileInput" accept=".txt" />
  </div>

  <div id="statsBar" style="display:none" class="stats-bar">
    📊 Total Entries: <span id="totalCount">0</span>
    &nbsp;·&nbsp; File: <span id="fileName">—</span>
  </div>

  <div id="searchWrap" class="search-wrap" style="display:none">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Search by URL, field name, or value..." />
  </div>

  <div id="cardsContainer"></div>

</div>

<div class="toast" id="toast">Copied!</div>

<script>
  let parsedEntries = [];

  // Drag and drop
  const dropZone = document.getElementById('dropZone');
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.name.endsWith('.txt')) loadFile(file);
  });

  document.getElementById('fileInput').addEventListener('change', e => {
    if (e.target.files[0]) loadFile(e.target.files[0]);
  });

  document.getElementById('searchInput').addEventListener('input', e => {
    renderCards(parsedEntries, e.target.value.trim().toLowerCase());
  });

  function loadFile(file) {
    const reader = new FileReader();
    reader.onload = e => {
      parsedEntries = parseText(e.target.result);
      document.getElementById('totalCount').textContent = parsedEntries.length;
      document.getElementById('fileName').textContent = file.name;
      document.getElementById('statsBar').style.display = 'flex';
      document.getElementById('searchWrap').style.display = 'block';
      renderCards(parsedEntries, '');
    };
    reader.readAsText(file);
  }

  function parseText(text) {
    const entries = [];
    // Split by blank lines
    const blocks = text.split(/\n\s*\n/).map(b => b.trim()).filter(Boolean);

    for (const block of blocks) {
      const lines = block.split('\n').map(l => l.trim()).filter(Boolean);
      const entry = { url: '', fields: [] };

      for (const line of lines) {
        const colonIdx = line.indexOf(':');
        if (colonIdx === -1) continue;
        const key = line.slice(0, colonIdx).trim();
        const val = line.slice(colonIdx + 1).trim();

        if (key.toLowerCase() === 'url') {
          entry.url = val;
        } else {
          entry.fields.push({ label: key, value: val });
        }
      }

      if (entry.url || entry.fields.length) entries.push(entry);
    }
    return entries;
  }

  function renderCards(entries, query) {
    const container = document.getElementById('cardsContainer');
    container.innerHTML = '';

    const filtered = query
      ? entries.filter(e => {
          const haystack = [e.url, ...e.fields.map(f => f.label + ' ' + f.value)].join(' ').toLowerCase();
          return haystack.includes(query);
        })
      : entries;

    if (!filtered.length) {
      container.innerHTML = `<div class="empty-state"><div class="big">🔎</div>No entries found.</div>`;
      return;
    }

    filtered.forEach((entry, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.animationDelay = `${i * 0.04}s`;

      const hasUrl = entry.url && entry.url !== '';
      const urlDisplay = hasUrl ? entry.url : '—';
      const urlHref = hasUrl ? (entry.url.startsWith('http') ? entry.url : 'https://' + entry.url) : '#';

      let fieldsHtml = entry.fields.map(f => `
        <div class="field-row">
          <div class="field-label">${escHtml(f.label)}</div>
          <div class="field-value ${f.value ? '' : 'empty'}">${f.value ? escHtml(f.value) : 'empty'}</div>
          <button class="copy-btn" title="Copy ${escHtml(f.label)}" onclick="copyText(this, ${JSON.stringify(f.value || '')})">⧉</button>
        </div>
      `).join('');

      card.innerHTML = `
        <div class="card-header">
          <span class="card-num">#${String(i + 1).padStart(2, '0')}</span>
          <a class="card-url" href="${urlHref}" target="_blank" title="${escHtml(entry.url)}">${escHtml(urlDisplay)}</a>
          ${hasUrl ? `<button class="copy-url-btn" title="Copy URL" onclick="copyText(this, ${JSON.stringify(entry.url)})">⧉</button>` : ''}
        </div>
        <div class="card-body">
          ${fieldsHtml || '<div style="color:var(--muted);font-family:var(--mono);font-size:12px">No fields</div>'}
        </div>
      `;

      container.appendChild(card);
    });
  }

  function copyText(btn, text) {
    if (!text) return;
    navigator.clipboard.writeText(text).then(() => {
      btn.classList.add('copied');
      btn.textContent = '✓';
      showToast('Copied!');
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.textContent = '⧉';
      }, 1500);
    });
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 2000);
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
